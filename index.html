<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday! 💖</title>
<style>
  /* CLEAN NO-BORDER DESIGN */
  body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #ffdee9, #b5fffc);
    overflow-x: hidden;
    position: relative;
  }
  
  .container {
    text-align: center;
    max-width: 500px;
    margin: 0 auto;
    padding: 50px 20px;
    position: relative;
    z-index: 2;
  }
  
  h1 {
    font-size: 2.2em;
    color: #ff69b4;
    margin-bottom: 25px;
    text-shadow: 1px 1px 5px rgba(255,255,255,0.8);
  }

  /* MAIN PHOTO SECTION - NO BORDERS */
  .photo-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }
  
  /* SLIDESHOW - NO BORDER */
  .slideshow-container {
    position: relative;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    overflow: hidden;
  }
  .slideshow-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }
  .slideshow-container img.active { opacity: 1; }

  /* INITIAL SINGLE PHOTO - NO BORDER */
  .photo {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    object-fit: cover;
  }

  /* GIFs BESIDE SLIDESHOW - NO BORDERS */
  .gifs-section {
    display: none;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.6s ease;
  }
  .gifs-section.show {
    display: flex;
    opacity: 1;
    transform: scale(1);
  }
  .left-gif, .right-gif {
    width: 75px;
    height: 75px;
    object-fit: contain;
    border-radius: 15px;
    animation: gentleBounce 2.5s ease-in-out infinite;
  }
  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .left-gif { animation-delay: -0.5s; }
  .right-gif { animation-delay: 0s; }

  /* BOTTOM RIGHT VIDEO - NO BORDER */
  #video-section {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 20;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.7s ease;
  }
  #video-section.show {
    opacity: 1;
    transform: scale(1);
  }
  #birthday-video {
    width: 70px;
    height: 125px;
    border-radius: 15px;
    object-fit: cover;
  }

  /* BUTTONS */
  #button-container button {
    font-size: 1.55em;
    padding: 12px 32px;
    margin: 12px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  #yes-btn { 
    background: linear-gradient(45deg, #ff69b4, #ff1493);
    color: white; 
  }
  #no-btn { 
    background: linear-gradient(45deg, #add8e6, #87ceeb);
    color: white; 
  }
  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  }

  .signature {
    margin-top: 25px;
    font-size: 1.25em;
    color: #ff69b4;
    font-weight: bold;
  }

  /* FLOATING FLOWERS & HEARTS */
  #floating-container {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 1;
    pointer-events: none;
  }
  
  .floating-object {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
    opacity: 0.4;
    transition: opacity 1s ease;
    animation: flowerFloat 6s linear infinite;
  }
  
  .floating-object.enhanced {
    opacity: 0.7;
  }
  
  @keyframes flowerFloat {
    0% { 
      transform: translateY(100vh) rotate(0deg); 
      opacity: 0; 
    }
    5% { opacity: 0.4; }
    90% { opacity: 0.4; }
    100% { 
      transform: translateY(-50px) rotate(720deg); 
      opacity: 0; 
    }
  }

  /* HEART EFFECT FOR YES */
  .heart-effect {
    position: fixed;
    font-size: 24px;
    pointer-events: none;
    z-index: 50;
    opacity: 1;
  }
</style>

<body>

<div class="container">
  <h1 id="typing">Ano babyyy do you love me?</h1>
  
  <!-- INITIAL SINGLE PHOTO -->
  <div class="photo-section" id="photo-section">
    <img src="assets/images/cutiepie.jpg" alt="Cutiepie" class="photo" id="celebrant-photo">
  </div>
  
  <div id="button-container">
    <button id="yes-btn">YES 💖</button>
    <button id="no-btn">NO 😢</button>
  </div>
  <p class="signature">Baby mo siyempre: Jc ❤️</p>

<!-- BOTTOM RIGHT VIDEO -->
<div id="video-section">

<!-- GIFs APPEAR BESIDE SLIDESHOW AFTER YES -->
<div class="photo-section gifs-section" id="gifs-section">

  <img src="assets/gifs/right.gif" alt="💕" class="right-gif">

<!-- FLOATING CONTAINER -->

function typeMessage(text){
  if(typingInterval) clearInterval(typingInterval);
  typingElement.textContent = "";
  let i = 0;
  const speed = window.innerWidth < 768 ? 140 : 100;
  typingInterval = setInterval(()=>{
    typingElement.textContent += text[i];
    i++;
    if(i >= text.length){ 
      clearInterval(typingInterval); 
      typingInterval = null; 
    }
  }, speed);
}

function createHeart(){
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.className = "heart-effect";
  heart.style.cssText = `
    position:fixed; left:${Math.random()*100}vw; top:${Math.random()*60 + 20}vh;
    font-size:${18 + Math.random()*22}px; opacity:1; pointer-events:none;
    z-index:50; animation: heartFloat 2s ease-out forwards;
  `;
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(), 2000);
}

function startConfetti(){
  const colors = ["#ffb6c1","#ff69b4","#add8e6","#fff0f5","#ffe4e1"];
  const count = window.innerWidth < 768 ? 60 : 110;
  for(let i = 0; i < count; i++){
    const confetti = document.createElement("div");
    confetti.style.cssText = `
      position:fixed; width:7px; height:7px; background:${colors[Math.floor(Math.random()*5)]};
      left:${Math.random()*100}vw; top:-15px; border-radius:50%; pointer-events:none;
      z-index:50; animation: confettiFall 3s linear forwards;
    `;
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(), 3000);
  }
}

function createFloatingFlower() {
  const obj = document.createElement("div");
  obj.className = "floating-object";
  const flowers = ['🌸', '🌺', '🌹', '🌷', '💐', '🌻', '🪷'];
  obj.textContent = flowers[Math.floor(Math.random() * flowers.length)];
  obj.style.left = Math.random() * 100 + 'vw';
  obj.style.fontSize = (20 + Math.random() * 25) + 'px';
  obj.style.animationDuration = (5 + Math.random() * 3) + 's';
  floatingContainer.appendChild(obj);
  setTimeout(() => obj.remove(), 8000);
}

function enhanceFloatingObjects() {
  const objects = document.querySelectorAll('.floating-object');
  objects.forEach(obj => obj.classList.add('enhanced'));
}

function createSlideshow() {
  const slideshowContainer = document.createElement("div");
  slideshowContainer.className = "slideshow-container";
  
  slideshowImages.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.alt = `Our moment ${index + 1}`;
    if (index === 0) img.classList.add("active");
    slideshowContainer.appendChild(img);
  });
  
  photo.parentNode.replaceChild(slideshowContainer, photo);
  
  let currentSlide = 0;
  slideshowInterval = setInterval(() => {
    const slides = slideshowContainer.querySelectorAll("img");
    slides[currentSlide].classList.remove("active");
    currentSlide = (currentSlide + 1) % 20;
    slides[currentSlide].classList.add("active");
  }, 2800);
}

function showVideoAndGifs() {
  videoSection.classList.add("show");
  gifsSection.classList.add("show");
  document.getElementById("birthday-video").play().catch(() => {});
}

function shakeScreen(){
  const container = document.querySelector(".container");
  let i = 0;
  const interval = setInterval(()=>{
    const x = Math.random()*12 - 6;
    const y = Math.random()*12 - 6;
    container.style.transform = `translate(${x}px, ${y}px)`;
    i++;
    if(i > 12){ 
      clearInterval(interval); 
      container.style.transform = "translate(0,0)"; 
    }
  }, 25);
}

/* FIXED YES BUTTON - ALL EFFECTS WORK */

});

/* NO BUTTON */
noBtn.addEventListener("mousedown", ()=>{
  const randX = Math.floor(Math.random()*220) - 110;
  const randY = Math.floor(Math.random()*70) - 35;
  noBtn.style.position = "relative";
  noBtn.style.left = randX + "px";
  noBtn.style.top = randY + "px";
  noBtn.style.transition = "all 0.25s ease";

  let style = window.getComputedStyle(noBtn);
  let currentSize = parseInt(style.fontSize);
  if(currentSize > 8) noBtn.style.fontSize = (currentSize - 2.5) + "px";
  if(currentSize <= 8) noBtn.style.display = "none";

  const randomText = noMessages[Math.floor(Math.random()*noMessages.length)];
  typeMessage(randomText);
  shakeScreen();
  
  setTimeout(() => {
    noBtn.style.position = "";
    noBtn.style.left = "";
    noBtn.style.top = "";
  }, 250);
});

/* CSS ANIMATIONS */
const style = document.createElement('style');
style.textContent = `
  @keyframes heartFloat {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-180px) rotate(720deg); opacity: 0; }
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120vh) rotate(1080deg); opacity: 0; }
`;
document.head.appendChild(style);

/* START INITIAL FLOATING FLOWERS */
setInterval(() => {
  createFloatingFlower();
}, 2000);
</script>
</body>
